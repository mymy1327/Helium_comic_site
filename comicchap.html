<script>
  let lastScrollTop = 0;
  const toolbar = document.getElementById('chapterToolbar');

  window.addEventListener('scroll', function() {
    // Lấy vị trí cuộn hiện tại của trang
    let currentScroll = window.pageYOffset || document.documentElement.scrollTop;

    // Nếu cuộn xuống và cuộn qua một khoảng nhỏ (tránh bị giật giật ở đỉnh trang)
    if (currentScroll > lastScrollTop && currentScroll > 50) {
      // Cuộn xuống -> Ẩn thanh công cụ
      toolbar.classList.add('hide');
    } else {
      // Cuộn lên -> Hiện lại thanh công cụ
      toolbar.classList.remove('hide');
    }
    
    // Cập nhật lại vị trí cuộn cũ
    lastScrollTop = currentScroll <= 0 ? 0 : currentScroll; 
  }, false);
</script>
