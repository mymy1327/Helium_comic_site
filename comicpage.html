<html lang="en">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <title>Helium Team</title>
    <link rel = "stylesheet" href = "https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    <link rel="icon"type="image/png" href="helium_logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="homepage.css" rel="stylesheet">
  </head>
  <body>
    <first_banner>
      <img src="helium_logo.png" alt="Helium Team Logo" width="150px">
      <h1 class="welcome_text">Helium Team</h1>
      <div class="search_bar_form justify-content-center">
                    <input class="search_bar" id="search-input" oninput="handleSearch()" type="text" placeholder="Search">
                    <button class="search_button justify-content-center" id="search-button" onclick="performSearch()"><i class='bx bx-search'></i></button>
                </div>
        <div class="user_button">
            <a href="login.html"><i class='bx bx-user'></i></a>
            <a href="login.html"><i class="bx bx-arrow-to-right" ></i></a>
        </div>
    </first_banner>
    <navigation>
      <a href="homepage.html">Trang Chủ</a>
      <a href="comics.html">Truyện Hoàn Thành</a>
      <a href="about.html">Theo Dõi</a>
      <a href="contact.html">Fanpage</a>
      <a href="contact.html">Nhóm Dịch</a>
    </navigation>
    <div class="comic-detail-container">
  
  <div class="breadcrumb"><a href="homepage.html">Trang Chủ</a> <!---&gt;---> <a href="#"></a></div>

  <div class="comic-main-info">
    <div class="comic-cover">
      <img id="comic-cover" src="" alt="">
    </div>

    <div class="comic-details">
      <h1 class="comic-title" id="comic-title"></h1>
      <p class="comic-meta"><strong>Tên Khác:</strong><span id="comic-original-title"></span></p>
      <p class="comic-meta"><strong>Tác giả:</strong><span id="comic-author"></span></p>
      <p class="comic-meta"><strong>Nhóm dịch:</strong><span id="comic-team"></span></p>
      <p class="comic-meta"><strong>Tình trạng:</strong><span id="comic-status"></span></p>
      
      <div class="comic-stats">
        <span>❤️ 999</span>
        <span>👁️ 9999</span>
      </div>

      <div class="comic-tags" id="comic-tags">
        </div>

      <div class="comic-actions">
        <button class="btn btn-read">🟩 Đọc từ đầu</button>
        <button class="btn btn-follow">💖 Theo dõi</button>
        <button class="btn btn-like">💜 Thích</button>
      </div>

      <div class="comic-summary">
        <p id="comic-description"></p>
      </div>
    </div>
  </div>

  <div class="comic-chapters-section">
    <h2 class="section-heading">📜 Danh sách chap</h2>
    <div class="chapters-list" id="chapters-list">
        <!-- Các chap sẽ được thêm vào đây bằng JavaScript -->
      </div>
  </div>

  <div class="comic-comments-section">
    <h2 class="section-heading">💬 Bình luận (14) (khong hoat dong)</h2>
    <div class="comment-box">
      <div class="comment-textarea">
        <textarea placeholder="Nội dung bình luận"></textarea>
        <button class="btn-send-comment">🚀</button>
      </div>
    </div>
  </div>

</div>
    </body>
    <script src="comicpage.js"></script>
    </html>
